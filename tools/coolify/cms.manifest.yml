# cms-demo — Coolify deployment manifest
# Single source of truth for all CMS resources deployed via tools/coolify/deploy.ps1.
# Placeholder grammar (resolved by tools/coolify/lib/PlaceholderResolver.php):
#   {{uuid}}                 — fresh UUIDv4 every run
#   {{random_b64:N}}         — N random bytes, base64
#   {{random_hex:N}}         — N random bytes, hex
#   {{secret_pin:LABEL}}     — random base64 24 bytes; persistent — if a value already
#                              exists in Coolify env vars for the same key on the same
#                              resource, that value is reused (so secrets stay stable
#                              across reruns; rerun = no admin logout).
#   {{secret_pin:LABEL|hex:N}}, {{secret_pin:LABEL|b64:N}}, {{secret_pin:LABEL|uuid}}
#                            — same as above but with a custom generator on first run.
#   ${ENV_VAR_KEY}           — resolved AFTER placeholders, references another env var
#                              of the SAME CMS (cross-key interpolation).

defaults:
  project_name: cms-demo
  server_id: 0                  # localhost (host.docker.internal) — sole Coolify server
  destination_id: 0             # default StandaloneDocker
  github_app_id: 2              # cms-demo-fy5bc1ewowbe
  branch: main
  git_repository: NiKiLLst/cms-demo
  base_directory_prefix: /apps

cmss:

  directus:
    type: dockercompose
    fqdn: http://directus.nerdass.org
    docker_compose_location: /docker-compose.yml
    docker_compose_domains:
      directus:
        domain: http://directus.nerdass.org
    env:
      KEY:            "{{secret_pin:KEY|uuid}}"
      SECRET:         "{{secret_pin:SECRET}}"
      ADMIN_EMAIL:    filippo.ferretti@gmail.com
      ADMIN_PASSWORD: "Pluriagency1!"
      DB_DATABASE:    directus
      DB_USER:        directus
      DB_PASSWORD:    "{{secret_pin:DB_PASSWORD}}"
      PUBLIC_URL:     http://directus.nerdass.org

  ghost:
    type: dockercompose
    fqdn: http://ghost.nerdass.org
    docker_compose_location: /docker-compose.yml
    docker_compose_domains:
      ghost:
        domain: http://ghost.nerdass.org
    env:
      GHOST_URL:           http://ghost.nerdass.org
      MYSQL_ROOT_PASSWORD: "{{secret_pin:MYSQL_ROOT_PASSWORD}}"
      MYSQL_DATABASE:      ghost
      MYSQL_USER:          ghost
      MYSQL_PASSWORD:      "{{secret_pin:MYSQL_PASSWORD}}"

  pocketbase:
    type: dockercompose
    fqdn: http://pocketbase.nerdass.org
    docker_compose_location: /docker-compose.yml
    docker_compose_domains:
      pocketbase:
        domain: http://pocketbase.nerdass.org
    env: {}                      # PocketBase has no compose env

  strapi:
    type: dockerfile
    fqdn: http://strapi.nerdass.org
    dockerfile_location: /Dockerfile
    ports_exposes: "1337"
    env:
      HOST:                "0.0.0.0"
      PORT:                "1337"
      NODE_ENV:            production
      APP_KEYS:            "{{secret_pin:APP_KEYS}}"
      API_TOKEN_SALT:      "{{secret_pin:API_TOKEN_SALT}}"
      ADMIN_JWT_SECRET:    "{{secret_pin:ADMIN_JWT_SECRET}}"
      TRANSFER_TOKEN_SALT: "{{secret_pin:TRANSFER_TOKEN_SALT}}"
      JWT_SECRET:          "{{secret_pin:JWT_SECRET}}"
      ENCRYPTION_KEY:      "{{secret_pin:ENCRYPTION_KEY}}"
      DATABASE_CLIENT:     sqlite
      DATABASE_FILENAME:   .tmp/data.db

  payloadcms:
    type: dockercompose
    fqdn: http://payload.nerdass.org
    docker_compose_location: /docker-compose.yml
    docker_compose_domains:
      payload:
        domain: http://payload.nerdass.org
    env:
      PAYLOAD_SECRET: "{{secret_pin:PAYLOAD_SECRET|hex:32}}"
      DB_DATABASE:    payload
      DB_USER:        payload
      # hex (not base64) so the value is URL-safe inside DATABASE_URI.
      DB_PASSWORD:    "{{secret_pin:DB_PASSWORD|hex:24}}"
      DATABASE_URI:   "postgres://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_DATABASE}"
      NODE_ENV:       production

  nextjs-demo:
    type: dockerfile
    fqdn: http://next.nerdass.org
    dockerfile_location: /Dockerfile
    ports_exposes: "3000"
    base_directory_override: /apps/nextjs-demo   # the directory name differs from the cms key
    env:
      PORT:     "3000"
      NODE_ENV: production

  appwrite:
    type: service-template
    template: appwrite
    fqdn: http://appwrite.nerdass.org
    post_create_hook: hooks/appwrite.post-create.php
    env:
      _APP_ENV:                      production
      _APP_DOMAIN:                   appwrite.nerdass.org
      _APP_DOMAIN_TARGET:            appwrite.nerdass.org
      _APP_DOMAIN_FUNCTIONS:         appwrite.nerdass.org
      _APP_SYSTEM_EMAIL_ADDRESS:     filippo.ferretti@gmail.com
      # Coolify aliases compose service names with the resource UUID prefix —
      # bare "mariadb" / "redis" do NOT resolve in the container network; the
      # working alias is the container_name "appwrite-mariadb" / "appwrite-redis".
      _APP_DB_HOST:                  appwrite-mariadb
      _APP_DB_PORT:                  "3306"
      _APP_DB_USER:                  appwrite
      _APP_DB_SCHEMA:                appwrite
      _APP_DB_PASS:                  "{{secret_pin:_APP_DB_PASS|hex:24}}"
      _APP_DB_ROOT_PASS:             "{{secret_pin:_APP_DB_ROOT_PASS|hex:24}}"
      _APP_REDIS_HOST:               appwrite-redis
      _APP_REDIS_PORT:               "6379"
      # Without this, worker-functions can't dispatch to the executor and crashes.
      _APP_EXECUTOR_HOST:            http://openruntimes-executor/v1
      _APP_EXECUTOR_SECRET:          "{{secret_pin:_APP_EXECUTOR_SECRET|hex:32}}"
      _APP_OPENSSL_KEY_V1:           "{{secret_pin:_APP_OPENSSL_KEY_V1|hex:32}}"
      _APP_OPTIONS_FORCE_HTTPS:      disabled
      _APP_OPTIONS_ROUTER_PROTECTION: disabled
